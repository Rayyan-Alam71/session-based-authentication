services:
  postgres:
    image: postgres:latest
    container_name: express-backend
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    
    volumes:
      - postgres_data:/var/lib/postgresql/
    
  redis:
    image: redis:latest
    container_name: redis-backend
    ports:
    - "6379:6379"
    volumes:
    - redis_data:/data

volumes:
  postgres_data:
  redis_data: